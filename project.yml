# Generated by AppFactoryKit appgen, hardened for App Store release.
name: DocumentScannerOCR
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  DocumentScannerOCR:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Doc Scanner"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Doc Scanner uses the camera to scan your documents."
        NSPhotoLibraryAddUsageDescription: "Doc Scanner saves scanned PDFs and pages to your photo library."
    settings:
      base:
        PRODUCT_NAME: DocumentScannerOCR
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.documentscanner
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
  DocumentScannerOCRTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/Scanner.swift   # logic under test; no app host / package needed
    settings:
      base:
        PRODUCT_NAME: DocumentScannerOCRTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.documentscanner.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        DocumentScannerOCRTests: [test]
    test:
      targets:
        - DocumentScannerOCRTests
